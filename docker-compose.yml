version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: galletrix_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: galletrix_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: galletrix_backend
    restart: always
    ports:
      - "5252:5000"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=galletrix_db;User=root;Password=root_password;
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
